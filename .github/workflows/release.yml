name: Android Signed Release
on:
  workflow_dispatch:
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - run: echo "$KEYSTORE_BASE64" | base64 --decode > keystore.jks
      - run: ./gradlew bundleRelease
